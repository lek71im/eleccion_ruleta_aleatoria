<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ruleta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d1a;
  --surface: #13131f;
  --surface2: #1c1c2e;
  --border: #2a2a45;
  --gold: #f0c040;
  --red: #E74C3C;
  --green: #27AE60;
  --orange: #E67E22;
  --blue: #2980B9;
  --text: #e8e8ff;
  --muted: #6666aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100dvh; background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; overflow-x: hidden; }

/* ── PANTALLA ENTRADA ── */
#pantalla-entrada {
  display: flex; flex-direction: column; align-items: center;
  min-height: 100dvh; padding: 28px 20px 40px; gap: 16px;
}
#pantalla-entrada p { color: var(--muted); font-size: 0.9rem; text-align: center; }

/* Selector número */
.sel-num {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 10px 18px;
}
.sel-num label { font-size: 0.9rem; color: var(--muted); }
.sel-num select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--gold); font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem; border-radius: 8px; padding: 4px 10px;
  outline: none; -webkit-appearance: none; text-align: center; width: 60px;
}

/* Grid nombres */
#grid-nombres {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; width: 100%; max-width: 440px;
}
#grid-nombres.una-col { grid-template-columns: 1fr; }

.campo-nombre {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 8px 12px;
}
.campo-nombre span { color: var(--muted); font-size: 0.8rem; width: 18px; flex-shrink: 0; }
.campo-nombre input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.95rem;
}
.campo-nombre input::placeholder { color: var(--border); }

/* Botones velocidad */
.vel-row {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; justify-content: center;
}
.vel-row label { color: var(--muted); font-size: 0.85rem; width: 100%; text-align: center; }

.btn-vel {
  padding: 10px 22px; border: 2px solid transparent;
  border-radius: 12px; font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; letter-spacing: 1px; cursor: pointer;
  transition: all .2s; -webkit-appearance: none;
}
.btn-vel:active { transform: scale(0.96); }
.btn-vel.activo-rapido { background: var(--orange); color: white; border-color: var(--orange); }
.btn-vel.activo-lento  { background: var(--blue);   color: white; border-color: var(--blue); }
.btn-vel.inactivo { background: var(--surface2); color: var(--muted); border-color: var(--border); }

/* Botón comenzar */
.btn-comenzar {
  width: 100%; max-width: 440px; padding: 16px;
  border: none; border-radius: 14px;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px;
  background: var(--red); color: white; cursor: pointer;
  box-shadow: 0 4px 24px #e74c3c44; -webkit-appearance: none;
  transition: transform .1s;
}
.btn-comenzar:active { transform: scale(0.97); }

#error-entrada { color: #ff6b6b; font-size: 0.85rem; min-height: 18px; text-align: center; }

/* ── PANTALLA RULETA ── */
#pantalla-ruleta {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100dvh;
  padding: 16px 16px 24px; gap: 14px;
}

.wheel-wrapper {
  position: relative;
  width: min(92vw, 460px);
  height: min(92vw, 460px);
}
canvas { width: 100%; height: 100%; }

/* Puntero */
.pointer {
  position: absolute; right: -20px; top: 50%; transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 17px solid transparent;
  border-bottom: 17px solid transparent;
  border-right: 34px solid var(--gold);
  filter: drop-shadow(0 0 6px #f0c04099);
}

/* Resultado */
#resultado {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.4rem, 6vw, 2.2rem);
  color: var(--gold); letter-spacing: 2px;
  text-align: center; min-height: 2.4rem;
  text-shadow: 0 0 18px #f0c04055;
  opacity: 0; transition: opacity .4s;
}
#resultado.visible { opacity: 1; }

/* Botones acción ruleta */
.botones-ruleta {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; width: 100%; max-width: 460px;
}
.btn-accion {
  padding: 12px 22px; border: none; border-radius: 12px;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px;
  cursor: pointer; -webkit-appearance: none; transition: transform .1s;
}
.btn-accion:active { transform: scale(0.96); }
.btn-girar    { background: var(--red);   color: white; }
.btn-siguiente { background: var(--green); color: white; display: none; }
.btn-reiniciar { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
</style>
</head>
<body>

<!-- ══ PANTALLA ENTRADA ══ -->
<div id="pantalla-entrada">
  <p>¡Que la suerte decida!</p>

  <div class="sel-num">
    <label>Participantes</label>
    <select id="num-participantes" onchange="actualizarCampos()">
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4" selected>4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
    </select>
  </div>

  <div id="grid-nombres"></div>

  <div class="vel-row">
    <label>Velocidad de giro</label>
    <button class="btn-vel activo-rapido" id="btn-rapido" onclick="setModo('rapido')">⚡ Rápido</button>
    <button class="btn-vel inactivo"      id="btn-lento"  onclick="setModo('lento')">🐢 Lento</button>
  </div>

  <div id="error-entrada"></div>
  <button class="btn-comenzar" onclick="comenzar()">▶ COMENZAR</button>
</div>

<!-- ══ PANTALLA RULETA ══ -->
<div id="pantalla-ruleta">
  <div class="wheel-wrapper">
    <canvas id="canvas"></canvas>
    <div class="pointer"></div>
  </div>

  <div id="resultado"></div>

  <div class="botones-ruleta">
    <button class="btn-accion btn-girar"     id="btn-girar"     onclick="iniciarGiro()">▶ GIRAR</button>
    <button class="btn-accion btn-siguiente" id="btn-siguiente" onclick="siguienteRonda()">➡ SIGUIENTE RONDA</button>
    <button class="btn-accion btn-reiniciar"                    onclick="reiniciar()">🔄 REINICIAR</button>
  </div>
</div>

<script>
// ── Paleta mezclada ──────────────────────────────────────────────────────────
const PALETA = [
  "#E74C3C","#2980B9","#F1C40F","#8E44AD",
  "#27AE60","#FF6B9D","#1ABC9C","#E67E22",
  "#6C3483","#FFD700","#16A085","#FF4500",
  "#2471A3","#DC143C","#117A65","#FF8C00",
  "#4A235A","#FA8072","#0E6655","#DAA520",
  "#1F618D","#FF6347","#C0392B","#1A5276",
];

function generarColores(n) {
  const paleta = [...PALETA];
  // Si hacen falta más colores que la paleta
  while (paleta.length < n) {
    const h = Math.random() * 360;
    paleta.push(`hsl(${h.toFixed(0)},75%,48%)`);
  }
  // Muestra aleatoria sin repetir
  const result = [];
  const copia = [...paleta];
  for (let i = 0; i < n; i++) {
    const idx = Math.floor(Math.random() * copia.length);
    result.push(copia.splice(idx, 1)[0]);
  }
  return result;
}

// ── Secuencia ────────────────────────────────────────────────────────────────
function calcularSecuencia(n, modo) {
  const pares   = Array.from({length: n}, (_,i) => i+1).filter(x => x % 2 === 0);
  const impares = Array.from({length: n}, (_,i) => i+1).filter(x => x % 2 !== 0);
  const orden = modo === 'rapido'
    ? [...pares, ...[...impares].reverse()]
    : [...impares, ...[...pares].reverse()];
  return orden.map(x => x - 1); // índices 0-based
}

// ── Estado global ────────────────────────────────────────────────────────────
let modo = 'rapido';
let participantesOrig = [];
let participantesVivos = [];
let secuencia = [];
let ronda = 0;
let colorPorParticipante = {};
let anguloActual = 0;
let girando = false;
let pendienteEliminar = -1;
let animId = null;

// ── Pantalla entrada ─────────────────────────────────────────────────────────
function setModo(m) {
  modo = m;
  document.getElementById('btn-rapido').className = 'btn-vel ' + (m === 'rapido' ? 'activo-rapido' : 'inactivo');
  document.getElementById('btn-lento').className  = 'btn-vel ' + (m === 'lento'  ? 'activo-lento'  : 'inactivo');
}

function actualizarCampos() {
  const n = parseInt(document.getElementById('num-participantes').value);
  const grid = document.getElementById('grid-nombres');
  grid.innerHTML = '';
  grid.className = n <= 4 ? 'una-col' : '';

  for (let i = 0; i < n; i++) {
    const div = document.createElement('div');
    div.className = 'campo-nombre';
    div.innerHTML = `<span>${i+1}.</span><input type="text" placeholder="Nombre" maxlength="14" id="p${i}">`;
    grid.appendChild(div);
  }
}

function comenzar() {
  const n = parseInt(document.getElementById('num-participantes').value);
  const nombres = [];
  for (let i = 0; i < n; i++) {
    const v = document.getElementById(`p${i}`).value.trim();
    nombres.push(v);
  }
  if (nombres.some(x => x === '')) {
    document.getElementById('error-entrada').textContent = '⚠ Rellena todos los nombres.';
    return;
  }
  document.getElementById('error-entrada').textContent = '';

  participantesOrig = nombres;
  participantesVivos = nombres.map((_, i) => i);
  secuencia = calcularSecuencia(n, modo);
  ronda = 0;
  anguloActual = 0;
  pendienteEliminar = -1;

  // Color fijo por participante
  const cols = generarColores(n);
  colorPorParticipante = {};
  for (let i = 0; i < n; i++) colorPorParticipante[i] = cols[i];

  document.getElementById('pantalla-entrada').style.display = 'none';
  const pr = document.getElementById('pantalla-ruleta');
  pr.style.display = 'flex';
  document.getElementById('resultado').textContent = '';
  document.getElementById('resultado').classList.remove('visible');
  document.getElementById('btn-siguiente').style.display = 'none';

  iniciarCanvas();
  setTimeout(dibujar, 80);
}

// ── Canvas ───────────────────────────────────────────────────────────────────
function iniciarCanvas() {
  const canvas = document.getElementById('canvas');
  const size = canvas.offsetWidth;
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  canvas.getContext('2d').scale(dpr, dpr);
}

function getCtx()  { return document.getElementById('canvas').getContext('2d'); }
function getSize() { return document.getElementById('canvas').offsetWidth; }

// ── Dibujo ───────────────────────────────────────────────────────────────────
function dibujar() {
  const ctx  = getCtx();
  const size = getSize();
  const cx = size / 2, cy = size / 2, r = size / 2 - 4;
  const n   = participantesVivos.length;
  if (n === 0) return;
  const seg = (2 * Math.PI) / n;
  const fs  = Math.max(9, Math.min(15, r / (n * 0.65)));

  ctx.clearRect(0, 0, size, size);

  participantesVivos.forEach((idxOrig, i) => {
    const inicio = anguloActual + i * seg;
    const fin    = inicio + seg;
    const color  = colorPorParticipante[idxOrig] || '#888';
    const nombre = participantesOrig[idxOrig];

    // Sector
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, inicio, fin);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#0d0d1a';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Texto
    const mid = inicio + seg / 2;
    // Ancho máximo disponible en el segmento (cuerda del arco a radio 0.65)
    const anchoMax = Math.min(r * 0.72, 2 * r * 0.65 * Math.sin(seg / 2) * 0.85);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(mid);
    ctx.textAlign = 'center';
    ctx.font = `bold ${fs}px Nunito, sans-serif`;
    ctx.shadowColor   = '#00000099';
    ctx.shadowBlur    = 3;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;
    ctx.fillStyle = 'white';
    // fillText con maxWidth recorta automáticamente si no cabe
    ctx.fillText(nombre, r * 0.62, fs * 0.36, anchoMax);
    ctx.restore();
  });

  // Borde dorado
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = '#f0c040';
  ctx.lineWidth = 4;
  ctx.stroke();

  // Centro
  ctx.beginPath();
  ctx.arc(cx, cy, 16, 0, 2 * Math.PI);
  ctx.fillStyle = '#0d0d1a';
  ctx.fill();
  ctx.strokeStyle = '#f0c040';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// ── Giro ─────────────────────────────────────────────────────────────────────
function iniciarGiro() {
  if (girando || ronda >= secuencia.length) return;

  document.getElementById('resultado').classList.remove('visible');
  document.getElementById('btn-girar').disabled = true;
  document.getElementById('btn-siguiente').style.display = 'none';
  girando = true;

  const idxGanadorOrig = secuencia[ronda];
  const posEnVivos     = participantesVivos.indexOf(idxGanadorOrig);
  const n              = participantesVivos.length;
  const seg            = (2 * Math.PI) / n;

  // Posición aleatoria dentro del segmento (distribución beta: tiende a extremos y centro)
  const t       = betaRandom(0.5, 0.5);
  const margen  = seg * 0.08;
  const offset  = margen + t * (seg - 2 * margen);
  const destino = (-(posEnVivos * seg) - offset + 4 * Math.PI) % (2 * Math.PI);

  const minV   = modo === 'rapido' ? 4 : 8;
  const maxV   = modo === 'rapido' ? 6 : 12;
  const vueltas = (minV + Math.floor(Math.random() * (maxV - minV + 1))) * 2 * Math.PI;
  const delta   = vueltas + ((destino - anguloActual % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const duracion = modo === 'rapido' ? 2500 : 6000;

  animar(delta, duracion, idxGanadorOrig);
}

function betaRandom(a, b) {
  // Aproximación beta(a,b) para valores pequeños usando gamma
  const ga = gammaRandom(a);
  const gb = gammaRandom(b);
  return ga / (ga + gb);
}
function gammaRandom(shape) {
  // Marsaglia-Tsang para shape >= 1; para shape < 1 usamos un truco
  if (shape < 1) return gammaRandom(1 + shape) * Math.pow(Math.random(), 1 / shape);
  const d = shape - 1/3, c = 1 / Math.sqrt(9 * d);
  while (true) {
    let x, v;
    do { x = normalRandom(); v = 1 + c * x; } while (v <= 0);
    v = v * v * v;
    const u = Math.random();
    if (u < 1 - 0.0331 * (x * x) * (x * x)) return d * v;
    if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v;
  }
}
function normalRandom() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function animar(delta, duracion, idxGanadorOrig) {
  const inicio      = performance.now();
  const anguloInicio = anguloActual;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function step(ahora) {
    const t = Math.min((ahora - inicio) / duracion, 1);
    anguloActual = anguloInicio + delta * easeOut(t);
    dibujar();
    if (t < 1) {
      animId = requestAnimationFrame(step);
    } else {
      girando = false;
      document.getElementById('btn-girar').disabled = false;
      mostrarGanador(idxGanadorOrig);
    }
  }
  animId = requestAnimationFrame(step);
}

// ── Ganador ──────────────────────────────────────────────────────────────────
function mostrarGanador(idxGanadorOrig) {
  const nombre = participantesOrig[idxGanadorOrig];
  const quedan = participantesVivos.length - 1;
  const el     = document.getElementById('resultado');
  const btnSig = document.getElementById('btn-siguiente');

  if (quedan > 0) {
    el.textContent = `🏆 ¡${nombre} ha ganado esta ronda!`;
    btnSig.textContent = `➡ SIGUIENTE RONDA (${quedan} restantes)`;
    btnSig.style.display = 'inline-block';
  } else {
    el.textContent = `🎉 ¡${nombre} es el último! Ruleta finalizada.`;
    btnSig.style.display = 'none';
  }
  el.classList.add('visible');

  ronda++;
  pendienteEliminar = idxGanadorOrig;
}

function siguienteRonda() {
  participantesVivos = participantesVivos.filter(x => x !== pendienteEliminar);
  document.getElementById('btn-siguiente').style.display = 'none';
  document.getElementById('resultado').classList.remove('visible');
  dibujar();
}

// ── Reiniciar ────────────────────────────────────────────────────────────────
function reiniciar() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  anguloActual = 0; ronda = 0; girando = false;
  document.getElementById('pantalla-ruleta').style.display = 'none';
  document.getElementById('pantalla-entrada').style.display = 'flex';
  document.getElementById('resultado').classList.remove('visible');
  document.getElementById('btn-siguiente').style.display = 'none';
}

// ── Init ─────────────────────────────────────────────────────────────────────
actualizarCampos();
</script>
</body>
</html>
